services:
  api:
    container_name: storybook-api-dev

    build:
      context: .
      dockerfile: docker/dev/Dockerfile

    ports:
      - "3000:3000"

    env_file:
      - .env

    volumes:
      - .:/app
      - /app/node_modules

    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:17-alpine

    container_name: storybook-postgres-dev

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: storybook

    ports:
      - "5432:5432"

    volumes:
      - postgres-data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d storybook"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
