services:
  api:
    container_name: storybook-api

    build:
      context: .
      dockerfile: docker/prod/Dockerfile

    ports:
      - "3000:3000"

    env_file:
      - .env.production

    restart: unless-stopped

    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:17-alpine

    container_name: storybook-postgres

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: storybook

    volumes:
      - postgres-prod-data:/var/lib/postgresql/data

    restart: unless-stopped

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d storybook"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-prod-data:
